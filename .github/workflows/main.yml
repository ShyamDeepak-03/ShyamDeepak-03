name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ShyamDeepak-03
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_dots=#161b22,#003300,#006600,#009900,#00ff41

      - name: Recolor Snake to Red
        run: |
          python3 - <<'PYEOF'
          import re
          with open('dist/github-contribution-grid-snake-dark.svg', 'r') as f:
              svg = f.read()
          # Find all unique fill colors for debugging
          colors = set(re.findall(r'fill="([^"]+)"', svg))
          print("Colors found:", colors)
          # The snake body is typically the non-dot, non-background color
          # Replace any dark/default snake colors with red
          for color in colors:
              if color.lower() not in ['#161b22','#003300','#006600','#009900','#00ff41','none','white','#ffffff']:
                  print(f"Replacing snake color: {color}")
                  svg = svg.replace(f'fill="{color}"', 'fill="#ff0000"')
          with open('dist/github-contribution-grid-snake-dark.svg', 'w') as f:
              f.write(svg)
          print("Done!")
          PYEOF

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          force: true
